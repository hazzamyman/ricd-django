[pytest]
DJANGO_SETTINGS_MODULE = src.ricdapp.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
pythonpath = src
addopts =
    --strict-markers
    --tb=short
    -v
markers =
    django_db: mark test as using Django database
    e2e: end-to-end test using Playwright
    unit: unit test
    integration: integration test