{% extends "base.html" %}
{% block title %}Confirm Delete - RICD{% endblock %}
{% block content %}
<div class="row mb-3"><div class="col"><h2>Confirm Delete</h2></div></div>
<div class="card border-danger"><div class="card-body">
  <p class="text-danger">Are you sure you want to delete <strong>{{ object }}</strong>? This cannot be undone.</p>
  <form method="post">{% csrf_token %}
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-danger">Confirm Delete</button>
      {% if back_url %}<a href="{{ back_url }}" class="btn btn-secondary">Cancel</a>{% endif %}
    </div>
  </form>
</div></div>
{% endblock %}
