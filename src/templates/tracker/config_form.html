{% extends "base.html" %}
{% block title %}Tracker Config: {{ council.name }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Tracker Config &mdash; {{ council.name }}</h2>
  <a href="{% url 'ui:tracker_config_list' %}" class="btn btn-outline-secondary btn-sm">Back</a>
</div>
<div class="card"><div class="card-body">
  <form method="post">
    {% csrf_token %}
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" name="council_submission_enabled" id="enabled" {% if config.council_submission_enabled %}checked{% endif %}>
      <label class="form-check-label" for="enabled">Allow council users to submit monthly/quarterly reports</label>
    </div>
    <div class="mb-3">
      <label class="form-label" for="due_day">Submission due day (of following month/quarter)</label>
      <input type="number" min="1" max="28" class="form-control" style="width:120px;" id="due_day" name="submission_due_day" value="{{ config.submission_due_day }}">
      <div class="form-text">Default is 8 for monthly trackers; quarterly reports are due 14 days after quarter end.</div>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'ui:tracker_config_list' %}" class="btn btn-outline-secondary">Cancel</a>
  </form>
</div></div>
{% endblock %}
