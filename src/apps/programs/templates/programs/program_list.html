{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <h1 class="mb-4">Programs</h1>
    
    <div class="card">
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for program in programs %}
                    <tr>
                        <td>{{ program.name }}</td>
                        <td>{{ program.description|default:"-" }}</td>
                        <td>
                            <a href="/admin/programs_program/{{ program.id }}/change/" class="btn btn-sm btn-outline-primary">Edit</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center">No programs found.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
