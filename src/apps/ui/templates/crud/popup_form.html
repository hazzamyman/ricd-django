<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ title|default:"Add" }} — RICD</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { padding: 16px; background: #f8f9fa; }
    .popup-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .popup-head h1 { font-size: 18px; margin: 0; }
  </style>
</head>
<body>
  <div class="popup-head">
    <h1>{{ title|default:"Add" }}</h1>
    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="window.close();">Cancel</button>
  </div>

  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="_popup" value="1">
    <input type="hidden" name="field" value="{{ popup_target_field }}">

    {% if form.non_field_errors %}
      <div class="alert alert-danger py-2 px-3">{{ form.non_field_errors }}</div>
    {% endif %}

    {% for field in form %}
    <div class="mb-3">
      <label for="{{ field.id_for_label }}" class="form-label">
        {{ field.label }}{% if field.field.required %} <span class="text-danger">*</span>{% endif %}
      </label>
      {{ field }}
      {% if field.help_text %}<div class="form-text text-muted">{{ field.help_text }}</div>{% endif %}
      {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
    </div>
    {% endfor %}

    <div class="d-flex gap-2 pt-3 border-top mt-3">
      <button type="submit" class="btn btn-primary">Save and close</button>
      <button type="button" class="btn btn-outline-secondary" onclick="window.close();">Cancel</button>
    </div>
  </form>
</body>
</html>
