{% extends "base.html" %}
{% block title %}{{ title|default:"Form" }} - RICD{% endblock %}
{% block content %}
<div class="row mb-3">
  <div class="col">
    <h2>{{ title|default:"Form" }}</h2>
  </div>
</div>
<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">Save</button>
        {% if back_url %}
        <a href="{{ back_url }}" class="btn btn-secondary">Back</a>
        {% endif %}
      </div>
    </form>
  </div>
</div>
{% endblock %}
