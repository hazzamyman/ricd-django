{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <h1 class="mb-4">Update Variation Status</h1>
    
    <div class="card">
        <div class="card-body">
            <form method="post" class="row g-3">
                {% csrf_token %}
                <div class="col-12">
                    <label class="form-label">New Status</label>
                    <select name="status" class="form-select" required>
                        <option value="DRAFT" {% if variation.status == 'DRAFT' %}selected{% endif %}>Draft</option>
                        <option value="COUNCIL_SIGNED" {% if variation.status == 'COUNCIL_SIGNED' %}selected{% endif %}>Council Signed</option>
                        <option value="EXECUTED" {% if variation.status == 'EXECUTED' %}selected{% endif %}>Executed</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Council Signed Date</label>
                    <input type="date" name="council_signed_date" class="form-control" value="{{ variation.council_signed_date|default:'' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Department Executed Date</label>
                    <input type="date" name="department_executed_date" class="form-control" value="{{ variation.department_executed_date|default:'' }}">
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Update Status</button>
                    <a href="{% url 'variations:variation_detail' variation.id %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
