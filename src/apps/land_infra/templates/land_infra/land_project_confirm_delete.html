{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <h1>Delete Land Project</h1>
    <p>Are you sure you want to delete "{{ land_project.name }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'land_infra:land_project_detail' land_project.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
