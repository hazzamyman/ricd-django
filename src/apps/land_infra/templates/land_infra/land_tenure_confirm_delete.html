{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <h1>Delete Land Tenure</h1>
    <p>Are you sure you want to delete Lot {{ land_tenure.lot_number }} on {{ land_tenure.plan_number }}?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'land_infra:land_tenure_detail' land_tenure.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
