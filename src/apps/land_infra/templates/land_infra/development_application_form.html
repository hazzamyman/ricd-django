{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <h1>{% if development_application %}Edit{% else %}Create{% endif %} Development Application</h1>
    
    <form method="post" class="card">
        {% csrf_token %}
        <div class="card-body">
            {{ form.as_p }}
        </div>
        <div class="card-footer">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'land_infra:development_application_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
