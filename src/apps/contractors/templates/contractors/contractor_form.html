{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <h1 class="mb-4">Create New Contractor</h1>
    
    <div class="card">
        <div class="card-body">
            <form method="post" class="row g-3">
                {% csrf_token %}
                <div class="col-md-6">
                    <label class="form-label">Company Name</label>
                    <input type="text" name="company_name" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Trade Type</label>
                    <input type="text" name="trade_type" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Contact Name</label>
                    <input type="text" name="contact_name" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Council</label>
                    <select name="council" class="form-select" required>
                        <option value="">Select Council</option>
                        {% for council in councils %}
                        <option value="{{ council.id }}">{{ council.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Create Contractor</button>
                    <a href="{% url 'contractors:contractor_list' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
