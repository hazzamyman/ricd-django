{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <h1 class="mb-4">Create New Project</h1>
    
    <div class="card">
        <div class="card-body">
            <form method="post" class="row g-3">
                {% csrf_token %}
                <div class="col-md-6">
                    <label class="form-label">Project Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Council</label>
                    <select name="council" class="form-select" required>
                        <option value="">Select Council</option>
                        {% for council in councils %}
                        <option value="{{ council.id }}">{{ council.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Program</label>
                    <select name="program" class="form-select" required>
                        <option value="">Select Program</option>
                        {% for program in programs %}
                        <option value="{{ program.id }}">{{ program.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Financial Year (optional - add later when funding confirmed)</label>
                    <select name="financial_year" class="form-select">
                        <option value="">-- Select --</option>
                        {% for code, label in financial_year_choices %}
                        <option value="{{ code }}" {% if code == current_financial_year %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Create Project</button>
                    <a href="{% url 'projects:project_list' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
