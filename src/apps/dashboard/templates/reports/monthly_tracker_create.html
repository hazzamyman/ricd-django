{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <h1 class="mb-4">Create Monthly Tracker</h1>
    
    <form method="post" class="col-md-6">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Funding Schedule</label>
            <select name="funding_schedule" class="form-select" required>
                <option value="">Select Funding Schedule</option>
                {% for fs in funding_schedules %}
                <option value="{{ fs.id }}">{{ fs.project.name }} - ${{ fs.total_funding }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Year</label>
            <input type="number" name="year" class="form-control" value="{{ year|default:2024 }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Month</label>
            <input type="number" name="month" class="form-control" value="{{ month|default:1 }}" min="1" max="12" required>
        </div>
        <button type="submit" class="btn btn-primary">Create</button>
        <a href="{% url 'reports:monthly_tracker_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
