{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <h1 class="mb-4">Create Quarterly Report</h1>
    
    <form method="post" class="col-md-6">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Project</label>
            <select name="project" class="form-select" required>
                <option value="">Select Project</option>
                {% for project in projects %}
                <option value="{{ project.id }}">{{ project.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Year</label>
            <input type="number" name="year" class="form-control" value="2024" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Quarter</label>
            <select name="quarter" class="form-select" required>
                <option value="1">Q1 (Jan-Mar)</option>
                <option value="2">Q2 (Apr-Jun)</option>
                <option value="3">Q3 (Jul-Sep)</option>
                <option value="4">Q4 (Oct-Dec)</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Create</button>
        <a href="{% url 'reports:quarterly_report_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
