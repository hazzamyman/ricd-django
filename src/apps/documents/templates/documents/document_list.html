{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <h1 class="mb-4">Document Types</h1>
    
    <div class="card">
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>File Based</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for doc in doc_types %}
                    <tr>
                        <td>{{ doc.name }}</td>
                        <td>
                            {% if doc.is_file_based %}
                            <span class="badge bg-primary">File</span>
                            {% else %}
                            <span class="badge bg-info">Link</span>
                            {% endif %}
                        </td>
                        <td>
                            <a href="/admin/documents_documenttype/{{ doc.id }}/change/" class="btn btn-sm btn-outline-primary">Edit</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center">No document types found.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
