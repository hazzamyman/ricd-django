{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <h1 class="mb-4">{% if delegation %}Edit{% else %}Add{% endif %} Delegation</h1>
    
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Position</label>
                    <select name="position" class="form-select" required>
                        <option value="">Select Position</option>
                        <option value="SENIOR_PROJECT_OFFICER" {% if delegation.position == 'SENIOR_PROJECT_OFFICER' %}selected{% endif %}>Senior Project Officer</option>
                        <option value="PRINCIPAL_PROJECT_OFFICER" {% if delegation.position == 'PRINCIPAL_PROJECT_OFFICER' %}selected{% endif %}>Principal Project Officer</option>
                        <option value="MANAGER" {% if delegation.position == 'MANAGER' %}selected{% endif %}>Manager</option>
                        <option value="DIRECTOR" {% if delegation.position == 'DIRECTOR' %}selected{% endif %}>Director</option>
                        <option value="EXECUTIVE_DIRECTOR" {% if delegation.position == 'EXECUTIVE_DIRECTOR' %}selected{% endif %}>Executive Director</option>
                        <option value="GENERAL_MANAGER" {% if delegation.position == 'GENERAL_MANAGER' %}selected{% endif %}>General Manager</option>
                        <option value="DEPUTY_DIRECTOR_GENERAL" {% if delegation.position == 'DEPUTY_DIRECTOR_GENERAL' %}selected{% endif %}>Deputy Director-General</option>
                        <option value="DIRECTOR_GENERAL" {% if delegation.position == 'DIRECTOR_GENERAL' %}selected{% endif %}>Director-General</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Min Amount ($)</label>
                    <input type="number" name="min_amount" class="form-control" step="0.01" value="{{ delegation.min_amount|default:'0' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Max Amount ($)</label>
                    <input type="number" name="max_amount" class="form-control" step="0.01" value="{{ delegation.max_amount|default:'' }}">
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" name="is_active" class="form-check-input" id="is_active" {% if delegation.is_active or not delegation %}checked{% endif %}>
                    <label class="form-check-label" for="is_active">Active</label>
                </div>
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="{% url 'maintenance:delegation_list' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
